<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atmost Partner Award Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    #app-header {
      height: 64px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 1000;
      flex-shrink: 0;
    }

    #branding {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #app-title {
      font-size: 17px;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.02em;
    }

    #app-subtitle {
      font-size: 12px;
      color: #64748b;
    }

    #search-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #airport-input {
      width: 80px;
      height: 36px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #airport-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
    }

    #search-btn {
      height: 36px;
      padding: 0 16px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    #search-btn:hover { background: #4f46e5; }
    #search-btn:active { background: #4338ca; }
    #search-btn:disabled { background: #374151; cursor: not-allowed; opacity: 0.6; }

    #error-msg {
      font-size: 12px;
      color: #f87171;
      min-width: 180px;
    }

    /* ── Legend ── */
    #legend {
      height: 36px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 24px;
      z-index: 999;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .legend-item {
      font-size: 11.5px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      color: #94a3b8;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* ── Popups ── */
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5) !important;
      padding: 0 !important;
    }

    .leaflet-popup-tip-container .leaflet-popup-tip {
      background: #1e293b !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 230px !important;
    }

    .leaflet-popup-close-button {
      color: #64748b !important;
      top: 8px !important;
      right: 10px !important;
    }

    .popup-content {
      padding: 14px 16px 12px;
    }

    .popup-header {
      border-bottom: 1px solid #334155;
      padding-bottom: 9px;
      margin-bottom: 10px;
    }

    .popup-iata {
      font-size: 24px;
      font-weight: 800;
      color: #f8fafc;
      display: block;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .popup-name {
      font-size: 11px;
      color: #94a3b8;
      display: block;
      margin-top: 3px;
      line-height: 1.4;
    }

    .popup-origin-label {
      font-size: 12px;
      font-weight: 600;
      color: #818cf8;
      padding: 4px 0 2px;
    }

    .popup-distance {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .distance-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      color: #0f172a;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .distance-mi {
      font-size: 12px;
      color: #94a3b8;
    }

    .award-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .award-table th {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #475569;
      padding: 2px 0 4px;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    .award-table th:last-child { text-align: right; }

    .award-table td {
      padding: 4px 0;
      color: #cbd5e1;
    }

    .award-table td:last-child {
      text-align: right;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #f1f5f9;
    }


    .popup-footer {
      font-size: 10px;
      color: #475569;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #334155;
    }

    /* ── Origin marker ── */
    .origin-marker {
      background: transparent !important;
      border: none !important;
    }

    .origin-pulse {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #6366f1;
      border: 3px solid #f8fafc;
      box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7);
      animation: origin-pulse 2s infinite;
    }

    @keyframes origin-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
      70%  { box-shadow: 0 0 0 12px rgba(99, 102, 241, 0); }
      100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }

    /* ── Leaflet tile attribution tweak ── */
    .leaflet-control-attribution {
      background: rgba(15, 23, 42, 0.75) !important;
      color: #64748b !important;
    }

    .leaflet-control-attribution a { color: #94a3b8 !important; }

    /* ── Zoom control ── */
    .leaflet-control-zoom a {
      background: #1e293b !important;
      color: #94a3b8 !important;
      border-color: #334155 !important;
    }
    .leaflet-control-zoom a:hover {
      background: #334155 !important;
      color: #f1f5f9 !important;
    }
  </style>
</head>

    // ── Build legend ─────────────────────────────────────────────────────────
    const legendEl = document.getElementById('legend');
    AWARD_BANDS.forEach(band => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${band.color}"></span>${band.label}`;
      legendEl.appendChild(item);
    });

    // ── Utility functions ─────────────────────────────────────────────────────
    function haversineDistance(lat1, lng1, lat2, lng2) {
      const R = 3958.8;
      const toRad = d => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLng = toRad(lng2 - lng1);
      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.asin(Math.sqrt(a));
    }

    function getBand(distanceMiles) {
      for (let i = 0; i < AWARD_BANDS.length; i++) {
        if (distanceMiles <= AWARD_BANDS[i].maxMiles) return i;
      }
      return AWARD_BANDS.length - 1;
    }

    function fmt(n) { return n.toLocaleString(); }

    function buildPopup(airport, distMiles, isOrigin, band) {
      if (isOrigin) {
        return `<div class="popup-content">
          <div class="popup-header">
            <span class="popup-iata">${airport.iata}</span>
            <span class="popup-name">${airport.name}</span>
          </div>
          <div class="popup-origin-label">Origin Airport</div>
        </div>`;
      }
      return `<div class="popup-content">
        <div class="popup-header">
          <span class="popup-iata">${airport.iata}</span>
          <span class="popup-name">${airport.name}</span>
        </div>
        <div class="popup-distance">
          <span class="distance-badge" style="background:${band.color}">${band.label}</span>
          <span class="distance-mi">${Math.round(distMiles).toLocaleString()} mi</span>
        </div>
        <table class="award-table">
          <thead><tr><th>Cabin</th><th>Miles (OW)</th></tr></thead>
          <tbody>
            <tr><td>Economy</td><td>${fmt(band.economy)}</td></tr>
            <tr><td>Prem Economy</td><td>${fmt(band.premEco)}</td></tr>
            <tr><td>Business</td><td>${fmt(band.business)}</td></tr>
            <tr><td>First</td><td>${fmt(band.first)}</td></tr>
          </tbody>
        </table>
        <div class="popup-footer">One-way · Atmost partner award · Taxes/fees extra</div>
      </div>`;
    }

    // ── Map state ─────────────────────────────────────────────────────────────
    let map = null;
    let ringLayers = [];
    let markerLayer = null;
    let aaRoutes    = null; // Map<string, Set<string>> — AA nonstop routes by origin
    let airportsMap = null; // Map<string, {name, city, lat, lng}> — from OpenFlights airports.dat

    // ── Route + airport data ──────────────────────────────────────────────────
    function setStatus(msg, isError = false) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.color = isError ? '#f87171' : '#94a3b8';
    }

    function parseCSVLine(line) {
      const result = [];
      let i = 0;
      while (i < line.length) {
        if (line[i] === '"') {
          let val = '';
          i++;
          while (i < line.length) {
            if (line[i] === '"' && line[i + 1] === '"') { val += '"'; i += 2; }
            else if (line[i] === '"') { i++; break; }
            else { val += line[i++]; }
          }
          result.push(val);
          if (line[i] === ',') i++;
        } else {
          let val = '';
          while (i < line.length && line[i] !== ',') val += line[i++];
          result.push(val);
          if (line[i] === ',') i++;
        }
      }
      return result;
    }

    async function loadRouteData() {
      const cachedRoutes   = localStorage.getItem('aaRoutes');
      const cachedAirports = localStorage.getItem('aaAirports');
      const cachedAt       = localStorage.getItem('aaRoutesAt');
      if (cachedRoutes && cachedAirports && cachedAt && Date.now() - Number(cachedAt) < 86400000) {
        aaRoutes    = new Map(JSON.parse(cachedRoutes).map(([k, v]) => [k, new Set(v)]));
        airportsMap = new Map(JSON.parse(cachedAirports));
        return;
      }

      const [routesText, airportsText] = await Promise.all([
        fetch('https://raw.githubusercontent.com/jpatokal/openflights/master/data/routes.dat').then(r => r.text()),
        fetch('https://raw.githubusercontent.com/jpatokal/openflights/master/data/airports.dat').then(r => r.text()),
      ]);

      // Parse AA nonstop routes
      const routeMap = new Map();
      for (const line of routesText.split('\n')) {
        const f = line.split(',');
        if (f.length < 9 || f[0] !== 'AA' || f[7] !== '0') continue;
        const src = f[2], dst = f[4];
        if (!routeMap.has(src)) routeMap.set(src, new Set());
        routeMap.get(src).add(dst);
      }

      // Collect all IATA codes referenced in AA routes (origins + destinations)
      const allIatas = new Set();
      routeMap.forEach((dests, src) => { allIatas.add(src); dests.forEach(d => allIatas.add(d)); });

      // Parse airports.dat — only keep airports in AA routes
      const aMap = new Map();
      for (const line of airportsText.split('\n')) {
        if (!line.trim()) continue;
        const f = parseCSVLine(line);
        if (f.length < 8) continue;
        const iata = f[4];
        if (!iata || iata === '\\N' || !allIatas.has(iata)) continue;
        const lat = parseFloat(f[6]), lng = parseFloat(f[7]);
        if (isNaN(lat) || isNaN(lng)) continue;
        aMap.set(iata, { name: f[1], city: f[2], lat, lng });
      }

      aaRoutes    = routeMap;
      airportsMap = aMap;
      localStorage.setItem('aaRoutes',   JSON.stringify([...routeMap.entries()].map(([k, v]) => [k, [...v]])));
      localStorage.setItem('aaAirports', JSON.stringify([...aMap.entries()]));
      localStorage.setItem('aaRoutesAt', String(Date.now()));
    }

    async function initMap() {
      map = L.map('map', {
        center: [20, -80],
        zoom: 3,
        zoomControl: true,
        attributionControl: true,
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18,
      }).addTo(map);

      // Load AA route data before rendering
      document.getElementById('airport-input').value = 'LGA';
      document.getElementById('search-btn').disabled = true;
      setStatus('Loading AA route data…');
      try {
        await loadRouteData();
        setStatus('');
      } catch (e) {
        setStatus('Route data unavailable — showing all airports', true);
      }
      document.getElementById('search-btn').disabled = false;
      renderOrigin('LGA');
    }

    function drawRings(lat, lng) {
      ringLayers.forEach(l => map.removeLayer(l));
      ringLayers = [];
      RING_MILES.forEach((miles, i) => {
        const circle = L.circle([lat, lng], {
          radius: miles * 1609.344,
          color: AWARD_BANDS[i].color,
          weight: 1.5,
          opacity: 0.55,
          fillOpacity: 0,
          dashArray: '6 5',
        }).addTo(map);
        ringLayers.push(circle);
      });
    }

    function drawMarkers(originIata) {
      if (markerLayer) markerLayer.clearLayers();
      else markerLayer = L.layerGroup().addTo(map);

      const originData = airportsMap ? airportsMap.get(originIata) : AIRPORTS.find(a => a.iata === originIata);
      if (!originData) return;

      // Draw origin marker
      const icon = L.divIcon({
        className: 'origin-marker',
        html: '<div class="origin-pulse"></div>',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });
      L.marker([originData.lat, originData.lng], { icon })
        .bindPopup(buildPopup({ iata: originIata, name: originData.name || originData.city }, 0, true, null), { maxWidth: 260 })
        .addTo(markerLayer);

      // Draw AA nonstop destination markers
      const dests = aaRoutes ? aaRoutes.get(originIata) : null;
      if (!dests) return;

      dests.forEach(destIata => {
        const destData = airportsMap ? airportsMap.get(destIata) : AIRPORTS.find(a => a.iata === destIata);
        if (!destData) return;
        const distMiles = haversineDistance(originData.lat, originData.lng, destData.lat, destData.lng);
        const band = AWARD_BANDS[getBand(distMiles)];
        L.circleMarker([destData.lat, destData.lng], {
          radius: 6,
          fillColor: band.color,
          color: '#1e293b',
          weight: 1,
          fillOpacity: 0.9,
          opacity: 1,
        })
        .bindPopup(buildPopup({ iata: destIata, name: `${destData.city} (${destIata})` }, distMiles, false, band), { maxWidth: 260 })
        .addTo(markerLayer);
      });
    }

    function renderOrigin(iata) {
      const origin = airportsMap ? airportsMap.get(iata) : AIRPORTS.find(a => a.iata === iata);
      if (!origin) return false;
      drawRings(origin.lat, origin.lng);
      drawMarkers(iata);
      map.setView([origin.lat, origin.lng], 3);
      return true;
    }

    // ── Search handler ────────────────────────────────────────────────────────
    function handleSearch() {
      const raw = document.getElementById('airport-input').value.trim().toUpperCase();

      if (!/^[A-Z]{3}$/.test(raw)) {
        setStatus('Enter a 3-letter IATA code (e.g. JFK)', true);
        return;
      }
      const found = airportsMap ? airportsMap.get(raw) : AIRPORTS.find(a => a.iata === raw);
      if (!found) {
        setStatus(`"${raw}" not found — try a major hub`, true);
        return;
      }
      setStatus('');
      renderOrigin(raw);
      const dests = aaRoutes ? aaRoutes.get(raw) : null;
      if (aaRoutes && (!dests || dests.size === 0)) {
        setStatus(`No AA nonstop routes found from ${raw}`, true);
      }
    }

    // ── Event wiring ──────────────────────────────────────────────────────────
    const inputEl = document.getElementById('airport-input');
    inputEl.addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase();
    });
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });
    document.getElementById('search-btn').addEventListener('click', handleSearch);

    document.addEventListener('DOMContentLoaded', initMap);
  </script>
